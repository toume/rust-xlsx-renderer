name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run test:ci

      - name: Verify npm package contents
        run: npm run pack:dry-run

  build-bindings:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: node:20.15-alpine
            build: >
              apk add --no-cache curl build-base &&
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable &&
              . "$HOME/.cargo/env" &&
              npm ci &&
              npm run build -- --target x86_64-unknown-linux-musl
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: node:20.15-alpine
            build: >
              apk add --no-cache curl build-base zig &&
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable &&
              . "$HOME/.cargo/env" &&
              rustup target add aarch64-unknown-linux-musl &&
              npm ci &&
              npm run build:zig -- --target aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ !matrix.docker }}
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        if: ${{ !matrix.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        if: ${{ !matrix.docker }}
        run: npm ci

      - name: Build binding
        if: ${{ !matrix.docker }}
        run: npm run build -- --target ${{ matrix.target }}

      - name: Build binding in docker
        if: ${{ matrix.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker }}
          options: -v ${{ github.workspace }}:/work -w /work
          run: ${{ matrix.build }}

      - name: Upload binding artifact
        uses: actions/upload-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: xlsx-renderer.*.node
          if-no-files-found: error
